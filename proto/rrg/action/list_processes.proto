syntax = "proto3";

package rrg.action.list_processes;

import "rrg/fs.proto";

message Args {
}

message Result {
    // PID of the process.
    uint32 pid = 1;

    // PID of the parent of the process.
    uint32 ppid = 2;

    // Name of the process.
    string name = 3;

    // Path to the executable of the process.
    rrg.fs.Path exe = 4;

    // Command-line arguments of the process (including program invocation).
    repeated string args = 5;
}
